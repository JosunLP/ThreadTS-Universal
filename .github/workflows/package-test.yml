name: 📦 Package Testing
permissions:
  contents: read

on:
  push:
    branches: [main, develop, githubActions]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.3.11"

jobs:
  package-test:
    name: 📦 Package Test
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📋 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build Project
        run: bun run build

      - name: 📦 Pack Package
        run: npm pack

      - name: 🧪 Test Package Installation
        run: |
          # Create temporary directory and test installation
          mkdir -p /tmp/package-test
          cd /tmp/package-test
          bun init -y
          echo "console.log('Dummy-Test erfolgreich');" > test.js
          node test.js
          bun add $GITHUB_WORKSPACE/threadts-universal-*.tgz

          # Test CommonJS import
          echo "const threadts = require('threadts-universal'); console.log('CommonJS import successful:', typeof threadts);" > test-cjs.cjs
          node test-cjs.cjs

          # Configure package.json for ES modules and test ES import
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.type='module'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          echo "import threadts from 'threadts-universal'; console.log('ES import successful:', typeof threadts);" > test-esm.mjs
          node test-esm.mjs

          # Test both exports
          echo "import { ThreadTS } from 'threadts-universal'; console.log('Named import successful:', typeof ThreadTS);" > test-named.mjs
          node test-named.mjs

      - name: 📊 Package Size Analysis
        run: |
          echo "📦 Package Analysis:"
          ls -lh threadts-universal-*.tgz

          echo "📋 Package Contents:"
          tar -tzf threadts-universal-*.tgz | head -20
