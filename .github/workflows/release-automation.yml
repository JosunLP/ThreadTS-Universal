name: 🚀 Release Automation

on:
  release:
    types:
      - published

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.3.11"
  REGISTRY_URL: "https://registry.npmjs.org"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 🔍 VALIDATE & BUILD
  # ═══════════════════════════════════════════════════════════════

  validate:
    name: 🔍 Validate Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Extract Version from Release
        id: version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          # SemVer 2.0.0 with a leading "v", optional prerelease, and optional build metadata.
          SEMVER_WITH_V_REGEX='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          if ! [[ "$TAG_NAME" =~ $SEMVER_WITH_V_REGEX ]]; then
            echo "❌ Release tag must use SemVer 2.0.0 with a leading v (for example v1.2.3, v1.2.3-beta.0, or v1.2.3+build.4)"
            echo "   Received tag: $TAG_NAME"
            exit 1
          fi

          VERSION="${TAG_NAME#v}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📊 Release version: $VERSION"

          # Check if prerelease (contains hyphen like 1.0.0-beta.0)
          if [[ "$VERSION" == *-* ]]; then
            echo "is-prerelease=true" >> "$GITHUB_OUTPUT"
            echo "📦 This is a prerelease"
          else
            echo "is-prerelease=false" >> "$GITHUB_OUTPUT"
            echo "📦 This is a stable release"
          fi

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY_URL }}

      - name: ✅ Validate Tag matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "   Tag version:     $TAG_VERSION"
            echo "   package.json:    $PACKAGE_VERSION"
            echo ""
            echo "💡 Fix: Update package.json version to $TAG_VERSION before publishing the release"
            exit 1
          fi

          echo "✅ Version validated: $TAG_VERSION"

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📋 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build Project
        run: bun run build

      - name: 🧪 Run Tests
        run: bun run test

      - name: 🔒 Security Audit
        run: bun audit || echo "⚠️ Security issues found (non-blocking)"

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # 📦 PUBLISH TO NPM
  # ═══════════════════════════════════════════════════════════════

  publish:
    name: 📦 Publish to NPM
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY_URL }}

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📋 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 📦 Pack Package
        id: pack
        run: |
          PACKAGE_TARBALL=$(npm pack --ignore-scripts --json | node -e "const fs = require('node:fs'); const raw = fs.readFileSync(0, 'utf8'); let data; try { data = JSON.parse(raw); } catch (error) { console.error('Failed to parse `npm pack --json` output as JSON.'); console.error('Raw output:', raw); console.error(error instanceof Error ? error.message : String(error)); process.exit(1); } const filename = data[0]?.filename; if (!filename || !filename.endsWith('.tgz')) { console.error('Unexpected `npm pack --json` output: expected an array whose first item has a `.filename` ending in `.tgz`.'); console.error('Parsed value:', JSON.stringify(data)); process.exit(1); } process.stdout.write(filename);")
          echo "package-tarball=$PACKAGE_TARBALL" >> "$GITHUB_OUTPUT"
          echo "📋 Package contents:"
          { tar -tzf "$PACKAGE_TARBALL" || [ $? -eq 141 ]; } | head -n 30

      - name: 📤 Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: ${{ steps.pack.outputs.package-tarball }}
          retention-days: 1

      - name: 🧪 Test Package Installation
        run: |
          mkdir -p /tmp/install-test
          cd /tmp/install-test
          bun init -y

          bun add "$GITHUB_WORKSPACE/${{ steps.pack.outputs.package-tarball }}"

          # Test ESM import
          cat > test.mjs << 'EOF'
          import threadts from 'threadts-universal';
          console.log('✅ ESM import successful');
          EOF
          node test.mjs

          # Test CJS require
          cat > test.cjs << 'EOF'
          const threadts = require('threadts-universal');
          console.log('✅ CJS require successful');
          EOF
          node test.cjs

      - name: 📤 Publish to npmjs.org with OIDC
        run: |
          # npm trusted publishing uses the workflow id-token, and setup-node configures npm for the registry.
          echo "🔐 Using npm trusted publishing via GitHub OIDC"
          PACKAGE_TARBALL="${{ steps.pack.outputs.package-tarball }}"

          if [ "${{ needs.validate.outputs.is-prerelease }}" = "true" ]; then
            # Extract prerelease identifier (e.g., "beta" from "1.0.0-beta.0")
            VERSION="${{ needs.validate.outputs.version }}"
            PRERELEASE="${VERSION%%+*}"
            PREID="${PRERELEASE#*-}"
            PREID="${PREID%%.*}"
            if [ -z "$PREID" ] || [[ ! "$PREID" =~ [A-Za-z-] ]]; then
              PREID="next"
            fi
            npm publish "$PACKAGE_TARBALL" --tag "$PREID" --provenance --access public
          else
            npm publish "$PACKAGE_TARBALL" --provenance --access public
          fi
          echo "✅ Published threadts-universal@${{ needs.validate.outputs.version }}"

  # ═══════════════════════════════════════════════════════════════
  # 📎 ATTACH RELEASE ASSETS
  # ═══════════════════════════════════════════════════════════════

  release-assets:
    name: 📎 Upload Release Assets
    runs-on: ubuntu-latest
    needs: [validate, publish]
    permissions:
      contents: write

    steps:
      - name: 📦 Download Package Tarball
        uses: actions/download-artifact@v4
        with:
          name: package-tarball
          path: .

      - name: 📎 Upload package tarball to existing release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            threadts-universal-*.tgz

  # ═══════════════════════════════════════════════════════════════
  # 📢 POST-RELEASE
  # ═══════════════════════════════════════════════════════════════

  post-release:
    name: 📢 Release Complete
    runs-on: ubuntu-latest
    needs: [validate, publish, release-assets]
    if: always() && needs.publish.result == 'success' && needs.release-assets.result == 'success'
    permissions:
      contents: read

    steps:
      - name: 🎯 Release Summary
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "🎉 RELEASE SUCCESSFUL"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Package: threadts-universal@${{ needs.validate.outputs.version }}"
          echo ""
          echo "🔗 Links:"
          echo "  NPM:     https://npmjs.com/package/threadts-universal"
          echo "  GitHub:  https://github.com/${{ github.repository }}/releases/tag/v${{ needs.validate.outputs.version }}"
          echo ""
          echo "══════════════════════════════════════════════════════════════"
