name: 🚀 Release Automation

# Triggered by pushing a tag like v1.0.0, v1.2.3-beta.0, etc.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.3.11"
  REGISTRY_URL: "https://registry.npmjs.org"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 🔍 VALIDATE & BUILD
  # ═══════════════════════════════════════════════════════════════

  validate:
    name: 🔍 Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Extract Version from Tag
        id: version
        run: |
          # Get version from tag (remove 'v' prefix)
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📊 Release version: $VERSION"

          # Check if prerelease (contains hyphen like 1.0.0-beta.0)
          if [[ "$VERSION" == *-* ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
            echo "📦 This is a prerelease"
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
            echo "📦 This is a stable release"
          fi

      - name: ✅ Validate Tag matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "   Tag version:     $TAG_VERSION"
            echo "   package.json:    $PACKAGE_VERSION"
            echo ""
            echo "💡 Fix: Update package.json version to $TAG_VERSION before tagging"
            exit 1
          fi

          echo "✅ Version validated: $TAG_VERSION"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY_URL }}

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📋 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build Project
        run: bun run build

      - name: 🧪 Run Tests
        run: bun run test

      - name: 🔒 Security Audit
        run: bun audit || echo "⚠️ Security issues found (non-blocking)"

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # 📦 PUBLISH TO NPM
  # ═══════════════════════════════════════════════════════════════

  publish:
    name: 📦 Publish to NPM
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY_URL }}

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📋 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 📦 Pack Package
        run: |
          npm pack
          echo "📋 Package contents:"
          tar -tzf threadts-universal-*.tgz | head -30

      - name: 🧪 Test Package Installation
        run: |
          mkdir -p /tmp/install-test
          cd /tmp/install-test
          bun init -y

          bun add "$GITHUB_WORKSPACE"/threadts-universal-*.tgz

          # Test ESM import
          cat > test.mjs << 'EOF'
          import threadts from 'threadts-universal';
          console.log('✅ ESM import successful');
          EOF
          node test.mjs

          # Test CJS require
          cat > test.cjs << 'EOF'
          const threadts = require('threadts-universal');
          console.log('✅ CJS require successful');
          EOF
          node test.cjs

      - name: 📤 Publish to NPM
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            export NPM_CONFIG_TOKEN="$NPM_TOKEN"
          fi

          if [ "${{ needs.validate.outputs.is-prerelease }}" = "true" ]; then
            # Extract prerelease identifier (e.g., "beta" from "1.0.0-beta.0")
            VERSION="${{ needs.validate.outputs.version }}"
            PREID=$(echo "$VERSION" | sed -n 's/.*-\([a-z]*\).*/\1/p')
            bun publish --tag "${PREID:-next}" --provenance --access public
          else
            bun publish --provenance --access public
          fi
          echo "✅ Published threadts-universal@${{ needs.validate.outputs.version }}"

  # ═══════════════════════════════════════════════════════════════
  # 🎉 CREATE GITHUB RELEASE
  # ═══════════════════════════════════════════════════════════════

  github-release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, publish]

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Generate Release Notes
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "v$VERSION" ]; then
            COMPARE_REF=$(git rev-list --max-parents=0 HEAD | head -1)
          else
            COMPARE_REF="$PREV_TAG"
          fi

          {
            echo "## What's Changed"
            echo ""

            # Features
            FEATURES=$(git log "$COMPARE_REF"..HEAD --pretty=format:"- %s" --grep="^feat" 2>/dev/null | head -10)
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo "$FEATURES"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$COMPARE_REF"..HEAD --pretty=format:"- %s" --grep="^fix" 2>/dev/null | head -10)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # If no conventional commits, show recent commits
            if [ -z "$FEATURES" ] && [ -z "$FIXES" ]; then
              echo "### 📝 Changes"
              git log "$COMPARE_REF"..HEAD --pretty=format:"- %s" 2>/dev/null | head -15
              echo ""
            fi

            echo ""
            echo "---"
            echo "📦 **Install:** \`bun add threadts-universal@$VERSION\`"
          } > release-notes.md

          cat release-notes.md

      - name: 📦 Download Build for Release
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 📦 Create Package Tarball
        run: npm pack

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: ThreadTS Universal v${{ needs.validate.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ needs.validate.outputs.is-prerelease }}
          generate_release_notes: true
          files: |
            threadts-universal-*.tgz

  # ═══════════════════════════════════════════════════════════════
  # 📢 POST-RELEASE
  # ═══════════════════════════════════════════════════════════════

  post-release:
    name: 📢 Release Complete
    runs-on: ubuntu-latest
    needs: [validate, publish, github-release]
    if: always() && needs.publish.result == 'success'

    steps:
      - name: 🎯 Release Summary
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "🎉 RELEASE SUCCESSFUL"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Package: threadts-universal@${{ needs.validate.outputs.version }}"
          echo ""
          echo "🔗 Links:"
          echo "  NPM:     https://npmjs.com/package/threadts-universal"
          echo "  GitHub:  https://github.com/${{ github.repository }}/releases/tag/v${{ needs.validate.outputs.version }}"
          echo ""
          echo "══════════════════════════════════════════════════════════════"
