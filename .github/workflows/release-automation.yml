name: 🚀 Release Automation

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.3.11"
  REGISTRY_URL: "https://registry.npmjs.org"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 🔍 VALIDATE & BUILD
  # ═══════════════════════════════════════════════════════════════

  validate:
    name: 🔍 Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Extract Version from Release
        id: version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "❌ Release tag must use semantic versioning with a leading v (for example v1.2.3 or v1.2.3-beta.0)"
            echo "   Received tag: $TAG_NAME"
            exit 1
          fi

          VERSION="${TAG_NAME#v}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📊 Release version: $VERSION"

          # Check if prerelease (contains hyphen like 1.0.0-beta.0)
          if [[ "$VERSION" == *-* ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
            echo "📦 This is a prerelease"
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
            echo "📦 This is a stable release"
          fi

      - name: ✅ Validate Tag matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "   Tag version:     $TAG_VERSION"
            echo "   package.json:    $PACKAGE_VERSION"
            echo ""
            echo "💡 Fix: Update package.json version to $TAG_VERSION before publishing the release"
            exit 1
          fi

          echo "✅ Version validated: $TAG_VERSION"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY_URL }}

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📋 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build Project
        run: bun run build

      - name: 🧪 Run Tests
        run: bun run test

      - name: 🔒 Security Audit
        run: bun audit || echo "⚠️ Security issues found (non-blocking)"

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # 📦 PUBLISH TO NPM
  # ═══════════════════════════════════════════════════════════════

  publish:
    name: 📦 Publish to NPM
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY_URL }}

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📋 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 📦 Pack Package
        run: |
          npm pack
          echo "📋 Package contents:"
          tar -tzf threadts-universal-*.tgz | head -30

      - name: 🧪 Test Package Installation
        run: |
          mkdir -p /tmp/install-test
          cd /tmp/install-test
          bun init -y

          bun add "$GITHUB_WORKSPACE"/threadts-universal-*.tgz

          # Test ESM import
          cat > test.mjs << 'EOF'
          import threadts from 'threadts-universal';
          console.log('✅ ESM import successful');
          EOF
          node test.mjs

          # Test CJS require
          cat > test.cjs << 'EOF'
          const threadts = require('threadts-universal');
          console.log('✅ CJS require successful');
          EOF
          node test.cjs

      - name: 📤 Publish to npmjs.org with OIDC
        run: |
          # npm trusted publishing uses the workflow id-token, and setup-node configures npm for the registry.
          echo "🔐 Using npm trusted publishing via GitHub OIDC"

          if [ "${{ needs.validate.outputs.is-prerelease }}" = "true" ]; then
            # Extract prerelease identifier (e.g., "beta" from "1.0.0-beta.0")
            VERSION="${{ needs.validate.outputs.version }}"
            PREID=$(echo "$VERSION" | sed -n 's/.*-\([a-z]*\).*/\1/p')
            npm publish --tag "${PREID:-next}" --provenance --access public
          else
            npm publish --provenance --access public
          fi
          echo "✅ Published threadts-universal@${{ needs.validate.outputs.version }}"

  # ═══════════════════════════════════════════════════════════════
  # 📎 ATTACH RELEASE ASSETS
  # ═══════════════════════════════════════════════════════════════

  release-assets:
    name: 📎 Upload Release Assets
    runs-on: ubuntu-latest
    needs: [validate, publish]

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Download Build for Release
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 📦 Create Package Tarball
        run: npm pack

      - name: 📎 Upload package tarball to existing release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            threadts-universal-*.tgz

  # ═══════════════════════════════════════════════════════════════
  # 📢 POST-RELEASE
  # ═══════════════════════════════════════════════════════════════

  post-release:
    name: 📢 Release Complete
    runs-on: ubuntu-latest
    needs: [validate, publish, release-assets]
    if: always() && needs.publish.result == 'success'

    steps:
      - name: 🎯 Release Summary
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "🎉 RELEASE SUCCESSFUL"
          echo "══════════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Package: threadts-universal@${{ needs.validate.outputs.version }}"
          echo ""
          echo "🔗 Links:"
          echo "  NPM:     https://npmjs.com/package/threadts-universal"
          echo "  GitHub:  https://github.com/${{ github.repository }}/releases/tag/v${{ needs.validate.outputs.version }}"
          echo ""
          echo "══════════════════════════════════════════════════════════════"
